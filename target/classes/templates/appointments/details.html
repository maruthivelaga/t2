<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Details - Hospital Appointment System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #333; }
        .navbar { background-color: #2c3e50; color: white; padding: 1rem 2rem; }
        .navbar-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none; }
        .navbar-menu { display: flex; gap: 1.5rem; align-items: center; }
        .navbar-link { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; transition: background-color 0.3s; }
        .navbar-link:hover { background-color: #34495e; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; }
        .card-title { font-size: 1.8rem; color: #2c3e50; margin-bottom: 1.5rem; border-bottom: 3px solid #3498db; padding-bottom: 0.5rem; }
        .detail-row { margin-bottom: 1.5rem; }
        .detail-label { font-weight: 600; color: #2c3e50; display: block; margin-bottom: 0.5rem; }
        .detail-value { color: #555; font-size: 1.1rem; }
        .badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 12px; font-size: 1rem; font-weight: 600; }
        .badge-scheduled { background-color: #3498db; color: white; }
        .badge-confirmed { background-color: #27ae60; color: white; }
        .badge-cancelled { background-color: #e74c3c; color: white; }
        .badge-completed { background-color: #95a5a6; color: white; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s; margin-right: 0.5rem; }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-secondary:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a th:href="@{/}" class="navbar-brand">🏥 Hospital Appointment System</a>
            <div class="navbar-menu">
                <a th:href="@{/patient/dashboard}" class="navbar-link">Dashboard</a>
                <a th:href="@{/appointments}" class="navbar-link">My Appointments</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="navbar-link" style="background: none; border: none; cursor: pointer; color: white;">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <div class="card">
            <h2 class="card-title">Appointment Details</h2>
            
            <div class="detail-row">
                <span class="detail-label">Appointment ID:</span>
                <span class="detail-value" th:text="${appointment.id}"></span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Date & Time:</span>
                <span class="detail-value" th:text="${#temporals.format(appointment.appointmentDateTime, 'EEEE, dd MMMM yyyy at HH:mm')}"></span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Doctor:</span>
                <span class="detail-value" th:text="${appointment.doctor.fullName}"></span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Specialty:</span>
                <span class="detail-value" th:text="${appointment.doctor.specialty.name}"></span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Status:</span>
                <span class="badge" 
                      th:classappend="'badge-' + ${#strings.toLowerCase(appointment.status)}"
                      th:text="${appointment.status}"></span>
            </div>
            
            <div class="detail-row" th:if="${appointment.reason}">
                <span class="detail-label">Reason:</span>
                <span class="detail-value" th:text="${appointment.reason}"></span>
            </div>
            
            <div class="detail-row" th:if="${appointment.notes}">
                <span class="detail-label">Notes:</span>
                <span class="detail-value" th:text="${appointment.notes}"></span>
            </div>
            
            <div class="detail-row">
                <span class="detail-label">Booked on:</span>
                <span class="detail-value" th:text="${#temporals.format(appointment.createdAt, 'dd-MM-yyyy HH:mm')}"></span>
            </div>
            
            <div style="margin-top: 2rem;">
                <form th:if="${appointment.status.name() == 'SCHEDULED' || appointment.status.name() == 'CONFIRMED'}" 
                      th:action="@{'/appointments/' + ${appointment.id} + '/cancel'}" 
                      method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger" 
                            onclick="return confirm('Are you sure you want to cancel this appointment?')">
                        Cancel Appointment
                    </button>
                </form>
                <a th:href="@{/appointments}" class="btn btn-secondary">Back to Appointments</a>
            </div>
        </div>
    </div>
</body>
</html>
